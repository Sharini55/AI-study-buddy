# alembic.ini — Alembic migration configuration for SunDevil AI
# Place this file at the root of the repository (next to app.py).

[alembic]
# The script_location points to the alembic/ folder we created
script_location = alembic

# database URL is intentionally left blank here.
# env.py reads it from the DATABASE_URL environment variable at runtime,
# so the connection string never lives in source control.
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
